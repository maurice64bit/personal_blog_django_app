{% extends 'base.html' %}

{% block content %}
<div class="content-container">
    <h1>Edit Post</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Update Post</button>
        <a href="{% url 'post_detail' object.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock content %}
