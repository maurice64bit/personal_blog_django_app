{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h2>Sign Up</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success" style="width: 100%;">Sign Up</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
    </p>
</div>
{% endblock content %}
